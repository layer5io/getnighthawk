<p class="doc-details">
	{% for category in include.docs.categories %}
		<span class="doc-filter">
			{% assign category_path = category | slugify | prepend: '/category/' | append: '/' %}
			<a href="{{ category_path | relative_url }}">{{ category | capitalize }}</a>
		</span>
	{% endfor %}
	<span class="doc-date">{{ include.docs.date | date: "%B %d, %Y" }}</span>
</p>
