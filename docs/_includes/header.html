<!DOCTYPE html>

<html lang="en">
  <head>
    {% assign absolute_page_url = page.url | absolute_url %}
    {% assign absolute_default_image = '/assets/images/logos/nighthawk/icon/nighthawk-logo.png' | absolute_url %}
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- Google Tag Manager -->
    {% unless jekyll.environment == 'preview' %}
    <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
   new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
   j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
    'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
    })(window,document,'script','dataLayer','GTM-TXGF3DB');</script>
    {% endunless %}
    <!-- End Google Tag Manager -->
    {% unless jekyll.environment == 'preview' %}
    <noscript>
      <div style = "text-align: center; background-color: #1E2117;">
      <br>
      <div >
      <p style="color: #EBC017; "> Please enable JavaScript to view the page</p>

    <br>
  </div>
    </noscript>
    {% endunless %}
    {% seo %} {% feed_meta %} {% if jekyll.environment == 'production' or jekyll.environment == 'preview' %}
    <link rel="stylesheet" href="{{ '/assets/css/stellarnav.min.css' | relative_url }}" />
    {% else %}
    <link rel="stylesheet" href="{{ '/assets/css/stellarnav.css' | relative_url }}" />
    {% endif %}
    <link rel="stylesheet" href="{{ '/assets/css/screen.css' | relative_url }}" />
    <link rel="icon" type="image/png" href="{{ '/favicon.ico' | relative_url }}" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css?family=Open+Sans"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.11.2/css/all.css"
    />
    <link rel="stylesheet" href="{{ '/assets/css/subscribe.css' | relative_url }}" />
    <link rel="stylesheet" href="{{ '/assets/css/getnighthawk.css' | relative_url }}" />

    {% if page.title == 'Programs' or page.title == 'CNCF' or page.title ==
    'CommunityBridge 2020' or page.title == 'Google Summer of Code 2019' or
    page.title == 'Google Summer of Code' or page.title == 'GSOD2020' or
    page.title == 'MLH Fellowship' %}
    <link rel="stylesheet" href="{{ '/assets/css/program.css' | relative_url }}" />
    {% endif %} {% if jekyll.environment == 'preview' %}
    <meta name="robots" content="noindex, nofollow" />
    {% endif %} {% if jekyll.environment == 'production' and
    site.google_analytics_key != '' %}
    <script>
      window.ga =
        window.ga ||
        function () {
          (ga.q = ga.q || []).push(arguments);
        };
      ga.l = +new Date();
      ga("create", "{{ site.google_analytics_key }}", "auto");
      ga("send", "pageview");
    </script>
    <script async src="https://www.google-analytics.com/analytics.js"></script>
    {% endif %}
    <!-- HTML Meta Tags -->
    <title>Nighthawk</title>
    <meta name="description" content="The Nighthawk distribution for service mesh performance characterization. Integrating Meshery and Service Mesh Performance.">

    <!-- Facebook Meta Tags -->
    <meta property="og:url" content="{{ absolute_page_url }}">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Nighthawk">
    <meta property="og:description" content="The Nighthawk distribution for servicFe mesh performance characterization. Integrating Meshery and Service Mesh Performance.">
    <meta property="og:image" content="{{ absolute_default_image }}">

    <!-- Twitter Meta Tags -->
    <meta name="twitter:card" content="summary_large_image">
    <meta property="twitter:domain" content="{{ site.url | replace: 'https://', '' | replace: 'http://', '' }}">
    <meta property="twitter:url" content="{{ absolute_page_url }}">
    <meta name="twitter:title" content="Nighthawk">
    <meta name="twitter:description" content="The Nighthawk distribution for service mesh performance characterization. Integrating Meshery and Service Mesh Performance.">
    <meta name="twitter:image" content="{{ absolute_default_image }}">
    <meta property="og:image:width" content="400" />
    <meta property="og:image:height" content="400" />
  </head>

  <body style="overflow-x: hidden">
    {% if page.title != "Nighthawk | The Performance Characterization Tool" and page.title != "Programs" %}
    <header id="mainHeader" class="filledHeader">
    {% else %}
    <header id="mainHeader">
    {% endif %}
      <div class="container nav-container custom-nav-container">
        <div class="custom-nav-cont-1">
          <!-- <li class="nav-item">
            <a href="{% include relative-src.html src='/' %}" class="nav-text">HOME</a>
          </li> -->
          <li class="nav-item">
            <a href="{% include relative-src.html src='/about' %}" class="nav-text">ABOUT</a>
          </li>
          <li class="nav-item">
            <a href="{% include relative-src.html src='/docs' %}" class="nav-text">DOCS</a>
          </li>
        </div>
        <div class="project-name">
          <a href="{{ '/' | relative_url }}">
            <img
              src="{{ '/assets/images/logos/nighthawk/horizontal/nighthawk-text-side.svg' | relative_url }}"
              alt="Nighthawk Logo"
              height="80px"
            />&nbsp;
          </a>
        </div>
        <div class="custom-nav-cont-2">
          <li class="nav-item">
            <a href="https://layer5.io/community" class="nav-text">COMMUNITY</a>
          </li>
          <li class="nav-item">
            <a href="https://github.com/layer5io/getnighthawk" class="nav-text">GITHUB</a>
          </li>
        </div>
        
        {% include navigation.html%}
      </div>
    </header>
  </body>
</html>
